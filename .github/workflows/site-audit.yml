# Scheduled LLM audit: rotates audit-queue.md, appends scores to audit-results.md
# and tasks to backlog.md. Requires repository secret GEMINI_API_KEY (Google AI Studio).
#
# Default schedule: 30 minutes past each hour UTC (stagger from on-the-hour jobs).
# Change `cron` below for a different pattern (times are always UTC).

name: Site audit (rotate queue)

on:
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: site-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/site-audit/requirements.txt

      - name: Run audit
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Optional repo variable GEMINI_MODEL (e.g. gemini-3.1-flash-lite-preview, gemini-2.5-flash)
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        run: python scripts/site-audit/audit.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit-queue.md backlog.md audit-results.md
          if git diff --staged --quiet; then
            echo "No file changes."
          else
            git commit -m "chore(audit): results + backlog + queue rotation [skip ci]"
            git push
          fi
